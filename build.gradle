plugins {
    id 'java'
    id 'com.diffplug.spotless' version '6.25.0'
}

repositories {
    mavenCentral()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

spotless {
    java {
        googleJavaFormat('1.19.2')

        removeUnusedImports()

        importOrder(
                'java',
                'javax',
                'org',
                'com.nhlstenden',
                ''
        )
    }
}