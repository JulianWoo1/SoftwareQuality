name: Dev (Java)

on:
  workflow_dispatch:
  push:
    branches: [development]
  pull_request:
    branches: [development]

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run Checkstyle
        run: |
          curl -sSL -o checkstyle.jar \
            https://github.com/checkstyle/checkstyle/releases/download/checkstyle-10.12.4/checkstyle-10.12.4-all.jar

          java -jar checkstyle.jar \
            -c config/checkstyle/checkstyle.xml \
            src

      - name: Spotless (Google Java Format check)
        run: |
          curl -sSL -o google-java-format.jar \
            https://github.com/google/google-java-format/releases/download/v1.19.2/google-java-format-1.19.2-all-deps.jar

          find src -name "*.java" > sources.txt

          java -jar google-java-format.jar --dry-run --set-exit-if-changed @sources.txt

      - name: Compile sources
        run: |
          mkdir -p out/classes
          find src -name "*.java" > sources.txt
          javac -encoding UTF-8 -d out/classes @sources.txt

      - name: Upload compiled classes
        uses: actions/upload-artifact@v4
        with:
          name: dev-compiled-classes
          path: out/classes