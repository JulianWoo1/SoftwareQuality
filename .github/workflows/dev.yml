name: Dev (Java)

on:
  workflow_dispatch:
  push:
    branches: [development]
  pull_request:
    branches: [development]

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Spotless (format check)
        run: |
          curl -sSL -o spotless.jar \
            https://repo1.maven.org/maven2/com/diffplug/spotless/spotless-cli/2.43.0/spotless-cli-2.43.0-all.jar
          java -jar spotless.jar check

      - name: Run Checkstyle
        run: |
          curl -sSL -o checkstyle.jar \
            https://repo1.maven.org/maven2/com/puppycrawl/tools/checkstyle/10.12.4/checkstyle-10.12.4-all.jar
          java -jar checkstyle.jar -c config/checkstyle/checkstyle.xml src

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Compile sources
        run: |
          mkdir -p out/classes
          find src -name "*.java" > sources.txt
          javac -encoding UTF-8 -d out/classes @sources.txt

      - name: Upload compiled classes
        uses: actions/upload-artifact@v4
        with:
          name: dev-compiled-classes
          path: out/classes
