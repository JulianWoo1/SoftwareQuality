name: Production (Java)

on:
  push:
    branches: [Production]
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Run Checkstyle
        run: |
          curl -sSL -o checkstyle.jar https://github.com/checkstyle/checkstyle/releases/download/checkstyle-10.12.4/checkstyle-10.12.4-all.jar
          java -jar checkstyle.jar -c config/checkstyle/checkstyle.xml src

      - name: Compile + Test + Build
        run: |
          curl -sSL -o junit.jar https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.2/junit-platform-console-standalone-1.10.2.jar

          mkdir -p out/classes out/test-classes
          find src -name "*.java" > sources.txt
          find test -name "*.java" > tests.txt

          javac -d out/classes @sources.txt
          javac -cp "out/classes:junit.jar" -d out/test-classes @tests.txt

          java -jar junit.jar execute --class-path "out/classes:out/test-classes" --scan-class-path

      - name: Build JAR
        run: |
          echo "Main-Class: com.nhlstenden.jabberpoint.JabberPoint" > manifest.mf
          jar cfm out/app.jar manifest.mf -C out/classes .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-jar
          path: out/app.jar