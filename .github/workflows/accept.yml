name: Acceptance (Java)

on:
  workflow_dispatch:
  push:
    branches: [Acceptence]
  pull_request:
    branches: [Acceptence]

jobs:
  acceptance:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Run Checkstyle
        run: |
          curl -sSL -o checkstyle.jar \
            https://github.com/checkstyle/checkstyle/releases/download/checkstyle-10.12.4/checkstyle-10.12.4-all.jar

          java -jar checkstyle.jar -c config/checkstyle/checkstyle.xml src

      - name: Run Spotless check
        run: |
          curl -sSL -o google-java-format.jar \
            https://github.com/google/google-java-format/releases/download/v1.19.2/google-java-format-1.19.2-all-deps.jar

          find src -name "*.java" | java -jar google-java-format.jar --dry-run --set-exit-if-changed

      - name: Compile
        run: |
          mkdir -p out/classes
          find src -name "*.java" > sources.txt
          javac -d out/classes @sources.txt

      - name: Run tests
        run: |
          curl -sSL -o junit.jar https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.2/junit-platform-console-standalone-1.10.2.jar

          mkdir -p out/test-classes
          find test -name "*.java" > tests.txt
          javac -cp "out/classes:junit.jar" -d out/test-classes @tests.txt

          java -jar junit.jar execute --class-path "out/classes:out/test-classes" --scan-class-path